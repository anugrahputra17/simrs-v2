name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ══════════════════════════════════════
  # JOB 1 — TEST
  # ══════════════════════════════════════
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, bcmath, tokenizer, xml, ctype, json

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Dependencies & Build Assets
        run: |
          npm install
          npm run build

      - name: Copy .env.testing
        run: cp .env.testing .env

      - name: Generate App Key
        run: php artisan key:generate --env=testing

      - name: Run Migrations
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Run Unit Tests
        run: php artisan test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root

  # ══════════════════════════════════════
  # JOB 2 — BUILD & PUSH IMAGE
  # ══════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: test  # ← hanya jalan jika test PASS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: masput17/simrs:latest

  # ══════════════════════════════════════
  # JOB 3 — DEPLOY KE VPS
  # ══════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: build  # ← hanya jalan jika build PASS

    steps:
      - name: Deploy via SSH ke VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/laravel-app
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f